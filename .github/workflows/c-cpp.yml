name: ESP32-AT CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: pip install -r requirements.txt

    - name: Validate factory param CSV
      run: |
        python -c "
        import csv
        with open('components/customized_partitions/raw_data/factory_param/factory_param_data.csv') as f:
            rows = list(csv.reader(f))
        headers = rows[0]
        assert 'platform' in headers, 'Missing platform column'
        assert 'module_name' in headers, 'Missing module_name column'
        print('factory_param_data.csv is valid ({} modules)'.format(len(rows) - 1))
        "

    - name: Validate module configs
      run: |
        python -c "
        import os
        config_root = 'module_config'
        for module_dir in os.listdir(config_root):
            idf_ver = os.path.join(config_root, module_dir, 'IDF_VERSION')
            assert os.path.exists(idf_ver), 'Missing IDF_VERSION in {}'.format(module_dir)
        print('All {} module configs are valid'.format(len(os.listdir(config_root))))
        "
