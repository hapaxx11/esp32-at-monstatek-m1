name: Build and Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'ESP32 platform target'
        required: true
        default: 'PLATFORM_ESP32C6'
        type: choice
        options:
          - PLATFORM_ESP32
          - PLATFORM_ESP32C3
          - PLATFORM_ESP32C2
          - PLATFORM_ESP32C6
      module:
        description: 'Module name (must match factory_param_data.csv for the chosen platform)'
        required: true
        default: 'ESP32C6-SPI'
      silence:
        description: 'Silence mode (removes some logs to reduce firmware size)'
        required: true
        default: '0'
        type: choice
        options:
          - '0'
          - '1'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Compute next build number
        id: version
        run: |
          # Find the highest existing build-N tag
          latest=$(git tag --list 'build-*' | sed 's/build-//' | sort -n | tail -1)
          if [ -z "$latest" ]; then
            next=1
          else
            next=$((latest + 1))
          fi
          echo "build_number=$next" >> "$GITHUB_OUTPUT"
          echo "tag=build-$next" >> "$GITHUB_OUTPUT"
          echo "Next build number: $next"

      - name: Configure build (write module_info.json)
        run: |
          mkdir -p build
          echo "{\"platform\": \"${{ inputs.platform }}\", \"module\": \"${{ inputs.module }}\", \"silence\": ${{ inputs.silence }}}" > build/module_info.json
          echo "module_info.json:"
          cat build/module_info.json

      - name: Install Python prerequisites
        run: pip install -r requirements.txt

      - name: Install ESP-IDF environment
        run: ./build.py install

      - name: Fix schema package compatibility in IDF Python env
        run: |
          # idf-component-manager 1.4.1 requires schema<0.7.6; newer schema versions
          # break idf_component_tools at import time with a TypeError in re.sub().
          # TODO: remove this step once idf-component-manager is updated upstream.
          IDF_PYTHON_ENV_PATH=$(python esp-idf/tools/idf_tools.py export --format=key-value \
            | grep '^IDF_PYTHON_ENV_PATH=' | cut -d= -f2-)
          if [ -z "$IDF_PYTHON_ENV_PATH" ]; then
            echo "ERROR: Could not determine IDF_PYTHON_ENV_PATH from idf_tools.py" >&2
            exit 1
          fi
          echo "IDF_PYTHON_ENV_PATH=$IDF_PYTHON_ENV_PATH"
          "$IDF_PYTHON_ENV_PATH/bin/pip" install "schema==0.7.5"

      - name: Weaken ieee80211_raw_frame_sanity_check symbol in libnet80211 (allow custom override)
        run: |
          OBJCOPY=$(find "$HOME/.espressif/tools/riscv32-esp-elf" -name "riscv32-esp-elf-objcopy" 2>/dev/null | head -1)
          if [ -z "$OBJCOPY" ]; then
            echo "riscv32-esp-elf-objcopy not found, skipping symbol weakening"
            exit 0
          fi
          LIBNET="esp-idf/components/esp_wifi/lib/esp32c6/libnet80211.a"
          if [ -f "$LIBNET" ]; then
            echo "Weakening ieee80211_raw_frame_sanity_check in $LIBNET"
            "$OBJCOPY" --weaken-symbol=ieee80211_raw_frame_sanity_check "$LIBNET" "${LIBNET}.patched"
            mv "${LIBNET}.patched" "$LIBNET"
            echo "Done."
          else
            echo "$LIBNET not found, skipping"
          fi

      - name: Build firmware
        run: ./build.py build

      - name: Prepare release assets
        run: |
          tag="${{ steps.version.outputs.tag }}"
          actor="${{ github.actor }}"
          module="${{ inputs.module }}"
          base_name="factory_${module}-${actor}-${tag}"
          # Find the factory combined binary produced by the build
          factory_bin=$(find build/factory -maxdepth 1 -name "*.bin" | head -1)
          if [ -z "$factory_bin" ]; then
            echo "ERROR: No factory binary found in build/factory/" >&2
            exit 1
          fi
          cp "$factory_bin" "${base_name}.bin"
          md5sum "${base_name}.bin" > "${base_name}.md5"
          echo "bin_file=${base_name}.bin" >> "$GITHUB_ENV"
          echo "md5_file=${base_name}.md5" >> "$GITHUB_ENV"
          echo "Release assets:"
          ls -lh "${base_name}.bin" "${base_name}.md5"
          echo "MD5: $(cat "${base_name}.md5")"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ steps.version.outputs.tag }} — ${{ inputs.module }}"
          body: |
            # What's New

            - `AT+DEAUTH`: Wi-Fi deauthentication attack
            - `AT+STASCAN`: Sniff stations (wireless clients) attached to a Wi-Fi access point
            - Binary opcode `0x02`: M1 capability probe response (fast boot, no 5 s timeout)

            # Flashing

            It is recommended to use the [qMonstatek](https://github.com/bedge117/qMonstatek) app to flash ESP32 firmware.

            Flash `${{ env.bin_file }}` at offset `0x0` (factory image includes bootloader + partition table + app).

            For M1: place `.bin` and `.md5` on SD card, flash via M1's ESP32 update menu.

            # Build Info
            - Based on ESP-AT v4.0.0.0 for ESP32-C6
            - SPI mode 1 (CPOL=0, CPHA=1)
            - Module: ${{ inputs.module }}
            - Platform: ${{ inputs.platform }}
            - Silence mode: ${{ inputs.silence }}
            - Triggered by: @${{ github.actor }}
            - Commit: ${{ github.sha }}
          files: |
            ${{ env.bin_file }}
            ${{ env.md5_file }}
          draft: false
          prerelease: false
